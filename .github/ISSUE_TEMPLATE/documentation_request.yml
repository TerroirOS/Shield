name: Documentation request
description: Propose docs/spec additions or clarification
title: "[docs] "
labels:
  - documentation
body:
  - type: textarea
    id: request
    attributes:
      label: Request
      description: What should be added or clarified?
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Rationale
      description: Why this matters for implementers or reviewers.
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Sources
      description: Links or references supporting this request.
